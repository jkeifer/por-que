# Python CI sets LEFTHOOK_EXCLUDE=js to skip the node-dependent commands.
pre-commit:
  parallel: true
  commands:
    ruff-check:
      glob: "*.{py,pyi}"
      run: uv run ruff check --force-exclude --fix --exit-non-zero-on-fix {staged_files}
      stage_fixed: true
    ruff-format:
      glob: "*.{py,pyi}"
      run: uv run ruff format --force-exclude {staged_files}
      stage_fixed: true
    mypy:
      glob: "*.{py,pyi}"
      run: uv run mypy {staged_files}
    check-added-large-files:
      exclude:
        - tests/fixtures/**
      run: uv run check-added-large-files {staged_files}
    check-toml:
      glob: "*.toml"
      run: uv run check-toml {staged_files}
    check-yaml:
      glob: "*.{yaml,yml}"
      run: uv run check-yaml {staged_files}
    end-of-file-fixer:
      exclude:
        - tests/fixtures/**
        - "**/*.{png,jpg,jpeg,gif,ico,svg,parquet}"
      run: uv run end-of-file-fixer {staged_files}
      stage_fixed: true
    trailing-whitespace:
      exclude:
        - tests/fixtures/**
        - "**/*.{png,jpg,jpeg,gif,ico,svg,parquet}"
      run: uv run trailing-whitespace-fixer {staged_files}
      stage_fixed: true
    eslint:
      tags: [js]
      root: ver-por-que/
      glob: "*.{js,mjs}"
      run: npm run lint:fix
      stage_fixed: true
    prettier:
      tags: [js]
      root: ver-por-que/
      glob: "*.{js,mjs,json,md,html,css}"
      run: npm run format
      stage_fixed: true
