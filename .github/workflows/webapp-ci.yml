name: "Webapp CI"

concurrency:
  group: webapp-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    paths:
      - "ver-por-que/**"
  pull_request:
    paths:
      - "ver-por-que/**"

jobs:
  ci:
    name: Webapp CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ver-por-que
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ver-por-que/package-lock.json
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: npm ci
      - name: Build por-que wheel for the in-browser parser
        # Stages the wheel into static/vendor/ so the pyodide integration test
        # has something to install (the fast suite skips it when absent).
        run: npm run wheel
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
