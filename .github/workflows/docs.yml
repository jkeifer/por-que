name: "Documentation"

concurrency:
  group: ${{ github.ref }}-docs
  cancel-in-progress: false

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "docs/**"
      - "src/**"
      - "zensical.toml"
      - "scripts/render-notebook.py"
      - "example-notebook.ipynb"

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - name: Sync
        run: |
          uv sync \
            --locked \
            --no-editable \
            --group docs
      - name: Render notebook
        run: uv run python scripts/render-notebook.py
      - name: Build site
        run: uv run zensical build --strict
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
