name: "Documentation"

concurrency:
  group: ${{ github.ref }}-docs
  cancel-in-progress: false

on:
  pull_request:
    paths:
      - "docs/**"
      - "src/**"
      - "zensical.toml"
      - "scripts/render-notebook.py"
      - "example-notebook.ipynb"

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - name: Sync
        run: |
          uv sync \
            --locked \
            --no-editable \
            --group docs
      - name: Render notebook
        run: uv run python scripts/render-notebook.py
      - name: Build site
        run: uv run zensical build --strict
